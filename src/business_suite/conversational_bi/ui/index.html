<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conversational BI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <div class="sub-portal">
        <div class="convbi-layout">
            <div class="convbi-sidebar">
                <button class="btn new-chat-btn" id="new-chat-btn">+ New Chat</button>
                <div class="session-list-header">Recent Chats</div>
                <div class="session-list" id="session-list">
                    <!-- Dynamically populated session items -->
                </div>
            </div>
            <div class="convbi-main">
                <div class="card">
                    <div class="chat-container">
                        <div class="chat-box" id="chat-box">
                            <div class="message bot">Hello! I am your Conversational BI Agent. Ask me anything grounded in our primary operational database.</div>
                        </div>
                        <div class="chat-input-row">
                            <input type="text" id="chat-in" placeholder="Ask a question (e.g., Explain our current performance metrics)..." />
                            <button class="btn" id="chat-send">Send Query</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/v1';
        
        // Authed Fetch Interceptor matching parent origin session storage
        const originalFetch = window.fetch;
        async function resolveAipToken() {
            for (let attempt = 0; attempt < 20; attempt += 1) {
                let token = localStorage.getItem('AIP_API_KEY') || '';
                if (!token && window.parent && window.parent !== window) {
                    try {
                        token = window.parent.localStorage.getItem('AIP_API_KEY') || '';
                    } catch (err) {
                        token = '';
                    }
                }
                if (token) return token;
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            return '';
        }
        window.fetch = async function(url, options = {}) {
            const isApiRequest = typeof url === 'string' && url.includes('/api/v1');
            if (isApiRequest) {
                const token = await resolveAipToken();
                if (!token) {
                    return new Response(JSON.stringify({ error: 'Authentication token is not available yet.' }), {
                        status: 401,
                        headers: { 'Content-Type': 'application/json' }
                    });
                }
                options.headers = options.headers || {};
                options.headers['Authorization'] = `Bearer ${token}`;
            }
            return originalFetch(url, options);
        };
    </script>
    <script src="index.js"></script>
</body>
</html>
