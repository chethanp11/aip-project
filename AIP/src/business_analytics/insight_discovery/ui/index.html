<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insight Discovery Segmenter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css" />
</head>
<body>
    <div class="sub-portal">
        
            <div class="card">
                <h2>💡 Treasury Insight Discovery</h2>
                <p class="desc">Mines corporate balances MoM trends to highlight significant cash shifts.</p>
                <button class="btn" id="disc-btn">Surface Segment Insights</button>
                <div class="results-grid mt-20 hide" id="disc-results"></div>
            </div>
        
    </div>
    
    <script>
        const API_BASE = '/api/v1';
        
        // Authed Fetch Interceptor matching parent origin session storage
        const originalFetch = window.fetch;
        window.fetch = async function(url, options = {}) {
            const token = localStorage.getItem('AIP_API_KEY') || '';
            if (url.includes('/api/v1')) {
                options.headers = options.headers || {};
                if (token) {
                    options.headers['Authorization'] = `Bearer ${token}`;
                }
            }
            return originalFetch(url, options);
        };
    </script>
    <script src="index.js"></script>
</body>
</html>
